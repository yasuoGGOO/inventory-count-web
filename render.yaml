services:
  - type: web
    name: inventory-count-web
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: DATA_DIR
        value: /var/data
    disk:
      name: inventory-data
      mountPath: /var/data
      sizeGB: 1
